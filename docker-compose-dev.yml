version: '3.8'

# =====================================
# PhotoVault - Docker Compose
# =====================================
# services:
# - PostgresSQL (Database)
# - LocalStack (simulator AWS S3)
# - PhotoVault App (application)
# =====================================

services:
  # ===================================
  # PostgreSQL Database
  # ===================================
  postgres:
    image: postgres:14-alpine
    container_name: photovault-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - photovault-network

  # ===================================
  # LocalStack - simulator AWS S3
  # ===================================
  localstack:
    image: localstack/localstack:latest
    container_name: photovault-localstack
    restart: unless-stopped
    environment:
      - SERVICES=s3
      - EDGE_PORT=4566
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    ports:
      - "4566:4566"
      - "4571:4571"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - photovault-network

  # ===================================
  # PhotoVault Application
  # ===================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photovault-app
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_DATASOURCE_URL=${DB_URL}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - photovault-network

# ===================================
# Volumes
# ===================================
volumes:
  postgres_data:
    driver: local
    name: photovault_postgres_data

  localstack_data:
    driver: local
    name: photovault_localstack_data

# ===================================
# Networks
# ===================================
networks:
  photovault-network:
    driver: bridge
    name: photovault_network